<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Block Blast – PIXELZONE</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Nunito', sans-serif;
  background: linear-gradient(160deg, #0d2340 0%, #1a3a60 50%, #0f2a4a 100%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  overflow-x: hidden;
  user-select: none;
}

/* ── HEADER ── */
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 1.25rem; height: 52px;
  background: rgba(0,0,0,.25);
  flex-shrink: 0;
}
.logo {
  display: flex; align-items: center; gap: .5rem;
  text-decoration: none; color: #fff; font-weight: 800; font-size: 1.05rem;
}
.logo-mark {
  width: 30px; height: 30px;
  background: rgba(255,255,255,.2); border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: .95rem;
}
.nav-login-btn {
  padding: .38rem .9rem; background: rgba(255,255,255,.18); color: #fff;
  border-radius: 8px; text-decoration: none; font-weight: 700; font-size: .85rem;
  border: 1px solid rgba(255,255,255,.25);
}
.nav-user { display: flex; align-items: center; gap: .6rem; font-size: .88rem; }
.nav-username { font-weight: 700; color: #fff; }
.nav-logout-btn {
  padding: .3rem .7rem; background: rgba(255,80,80,.2); color: #ffbbbb;
  border: 1px solid rgba(255,100,100,.3); border-radius: 6px;
  font-family: 'Nunito', sans-serif; font-weight: 700; font-size: .82rem; cursor: pointer;
}

/* ── GAME AREA ── */
.game-wrap {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: .75rem .75rem 1.25rem;
  gap: .9rem;
}

/* ── SCORE BAR ── */
.score-bar {
  display: flex; align-items: center; justify-content: center;
  gap: 2.5rem; width: 100%;
}
.score-item { text-align: center; }
.score-icon { font-size: 1.1rem; line-height: 1; margin-bottom: 1px; }
.score-val {
  font-size: 1.75rem; font-weight: 900; color: #fff;
  letter-spacing: -.03em; line-height: 1;
  text-shadow: 0 2px 8px rgba(0,0,0,.4);
}

/* ── GRID ── */
.grid-container {
  background: #071524;
  border-radius: 10px;
  padding: 4px;
  box-shadow: 0 8px 32px rgba(0,0,0,.5);
}
#grid {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  grid-template-rows: repeat(8, 1fr);
  gap: 2px;                        /* dünne dunkle Linie zwischen Zellen */
  width: min(340px, calc(100vw - 2.5rem));
  height: min(340px, calc(100vw - 2.5rem));
}
.cell {
  background: #162540;             /* dunkelblaue leere Zellen */
  border-radius: 0;                /* keine Abrundung */
}
.cell.filled  { border-radius: 0; }
.cell.preview-ok  { opacity: .55 !important; }
.cell.preview-bad { background: rgba(220,60,60,.5) !important; }

/* Zeilen-Lösch-Animation: Zelle wird erstmal zur Reihen-Farbe, dann blinkt sie */
.cell.flash-line {
  animation: lineFlash .35s ease-out forwards;
}
@keyframes lineFlash {
  0%   { filter: brightness(2.5) saturate(1.8); }
  60%  { filter: brightness(1.8) saturate(1.4); }
  100% { filter: brightness(1) saturate(1); opacity: 0; }
}

/* ── PIECE TRAY ── */
.tray {
  display: flex; align-items: center; justify-content: center;
  gap: 1rem;
  width: 100%; max-width: 340px;
  min-height: 100px;
}
.tray-slot {
  flex: 1; display: flex; align-items: center; justify-content: center;
  min-height: 90px;
  cursor: grab; touch-action: none;
  transition: opacity .2s, transform .15s;
}
.tray-slot:active { cursor: grabbing; transform: scale(.94); }
.tray-slot.used   { opacity: 0; pointer-events: none; }
.tray-slot.cant-fit { opacity: .25; cursor: not-allowed; }

/* Mini-Stücke: verbunden, keine Lücken, keine Abrundung */
.mini-piece {
  display: grid;
  gap: 0;
  pointer-events: none;
  filter: drop-shadow(0 3px 10px rgba(0,0,0,.5));
}
.mini-cell {
  width: 15px; height: 15px;
  border-radius: 0;
}

/* ── DRAG GHOST ── */
#ghost {
  position: fixed;
  pointer-events: none;
  z-index: 999;
  display: none;
  gap: 2px;
  opacity: .85;
  filter: drop-shadow(0 6px 18px rgba(0,0,0,.5));
}
#ghost .ghost-cell { border-radius: 0; }

/* ── SCORE POPUP ── */
.score-popup {
  position: fixed;
  font-size: 1.15rem; font-weight: 900; color: #fff;
  pointer-events: none; z-index: 998;
  text-shadow: 0 2px 6px rgba(0,0,0,.5);
  animation: popupFloat .9s ease-out forwards;
}
@keyframes popupFloat {
  0%   { opacity: 1; transform: translateY(0) translateX(-50%); }
  100% { opacity: 0; transform: translateY(-55px) translateX(-50%); }
}

/* ── GAME OVER ── */
#gameOverScreen {
  display: none;
  position: fixed; inset: 0; z-index: 100;
  background: rgba(5,15,30,.82);
  backdrop-filter: blur(10px);
  align-items: center; justify-content: center;
  padding: 1rem;
}
#gameOverScreen.show { display: flex; }
.go-card {
  background: #1a3050; border: 1px solid #2a4870;
  border-radius: 20px;
  padding: 2rem 2rem 1.75rem;
  width: 100%; max-width: 340px; text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,.6);
  animation: goSlide .35s cubic-bezier(.34,1.2,.64,1);
}
@keyframes goSlide {
  from { opacity: 0; transform: scale(.85) translateY(30px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}
.go-title  { font-size: 1.4rem; font-weight: 900; color: #fff; margin-bottom: .1rem; }
.go-score  { font-size: 3.2rem; font-weight: 900; color: #FECA57; letter-spacing: -.04em; margin: .4rem 0 .1rem; }
.go-hs     { font-size: .82rem; font-weight: 700; color: #6080a0; margin-bottom: 1.2rem; }
.go-hs.new-record { color: #48DBFB; }
.go-lb     { background: #0f2040; border-radius: 10px; border: 1px solid #2a3a54; padding: .75rem 1rem; margin-bottom: 1.2rem; text-align: left; }
.go-lb-title { font-size: .62rem; font-weight: 900; letter-spacing: .1em; text-transform: uppercase; color: #506080; margin-bottom: .55rem; }
.lb-row    { display: flex; align-items: center; gap: .6rem; font-size: .88rem; font-weight: 700; padding: .2rem 0; color: #7090b0; }
.lb-row.me { color: #FECA57; }
.lb-rank   { width: 1.4rem; font-size: .75rem; color: #405060; flex-shrink: 0; }
.lb-name   { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.lb-empty  { font-size: .8rem; color: #506080; font-weight: 600; }
.go-btn {
  display: inline-block; padding: .75rem 2.5rem;
  background: #3a86ff; color: #fff; border: none; border-radius: 10px;
  font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 1rem; cursor: pointer;
  box-shadow: 0 4px 20px rgba(58,134,255,.4);
  transition: opacity .15s, transform .15s;
}
.go-btn:hover { opacity: .9; transform: translateY(-2px); }

@media (max-width: 380px) {
  .mini-cell { width: 12px; height: 12px; }
  .tray { gap: .6rem; }
}
</style>
</head>
<body>

<header>
  <a href="../../index.html" class="logo">
    <div class="logo-mark">🕹</div>
    <span>PIXELZONE</span>
  </a>
  <div id="navAuth"><a href="../../login.html" class="nav-login-btn">Anmelden</a></div>
</header>

<div class="game-wrap">
  <div class="score-bar">
    <div class="score-item">
      <div class="score-icon">👑</div>
      <div class="score-val" id="scoreDisp">0</div>
    </div>
    <div class="score-item">
      <div class="score-icon">🏆</div>
      <div class="score-val" id="highscoreDisp">0</div>
    </div>
  </div>

  <div class="grid-container">
    <div id="grid"></div>
  </div>

  <div class="tray" id="tray">
    <div class="tray-slot" id="slot0"></div>
    <div class="tray-slot" id="slot1"></div>
    <div class="tray-slot" id="slot2"></div>
  </div>
</div>

<div id="ghost"></div>

<div id="gameOverScreen">
  <div class="go-card">
    <div class="go-title">Game Over</div>
    <div class="go-score" id="goScore">0</div>
    <div class="go-hs" id="goHs">Bestleistung: 0</div>
    <div class="go-lb">
      <div class="go-lb-title">Top 5</div>
      <div id="goLbList"><div class="lb-empty">Laden…</div></div>
    </div>
    <button class="go-btn" onclick="spielStart()">Nochmal spielen</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../../auth.js"></script>
<script>PZ.pruefeSpielStatus('block-blast');</script>
<script>
'use strict';

const RASTER_SIZE = 8;

const FARBEN = {
  rot:    '#e84040',
  orange: '#f07020',
  gelb:   '#f0c030',
  gruen:  '#30b870',
  blau:   '#3880e0',
  lila:   '#8855d0',
  rosa:   '#d04090',
  tuerkis:'#20b8b0',
};
const F = FARBEN;

const FORMEN_LEICHT = [
  { z: [[0,0]],                   f: F.rot    },
  { z: [[0,0],[0,1]],             f: F.orange },
  { z: [[0,0],[1,0]],             f: F.gelb   },
  { z: [[0,0],[0,1],[0,2]],       f: F.gruen  },
  { z: [[0,0],[1,0],[2,0]],       f: F.blau   },
  { z: [[0,0],[0,1],[1,0],[1,1]], f: F.lila   },
  { z: [[0,0],[0,1],[1,0]],       f: F.rosa   },
  { z: [[0,0],[0,1],[1,1]],       f: F.tuerkis},
  { z: [[0,0],[1,0],[1,1]],       f: F.orange },
  { z: [[0,1],[1,0],[1,1]],       f: F.rot    },
];

const FORMEN_MITTEL = [
  { z: [[0,0],[1,0],[2,0],[2,1]],         f: F.rot    },
  { z: [[0,1],[1,1],[2,0],[2,1]],         f: F.blau   },
  { z: [[0,0],[0,1],[0,2],[1,0]],         f: F.gruen  },
  { z: [[0,0],[0,1],[0,2],[1,2]],         f: F.orange },
  { z: [[0,0],[1,0],[1,1],[1,2]],         f: F.lila   },
  { z: [[0,2],[1,0],[1,1],[1,2]],         f: F.rosa   },
  { z: [[0,0],[0,1],[0,2],[1,1]],         f: F.tuerkis},
  { z: [[0,1],[1,0],[1,1],[2,1]],         f: F.gelb   },
  { z: [[0,1],[1,0],[1,1],[1,2]],         f: F.rot    },
  { z: [[0,0],[1,0],[1,1],[2,0]],         f: F.blau   },
  { z: [[0,1],[0,2],[1,0],[1,1]],         f: F.orange },
  { z: [[0,0],[0,1],[1,1],[1,2]],         f: F.gruen  },
  { z: [[0,0],[1,0],[1,1],[2,1]],         f: F.lila   },
  { z: [[0,1],[1,0],[1,1],[2,0]],         f: F.rosa   },
];

const FORMEN_SCHWER = [
  { z: [[0,0],[0,1],[0,2],[0,3]],                                f: F.blau   },
  { z: [[0,0],[1,0],[2,0],[3,0]],                                f: F.tuerkis},
  { z: [[0,0],[0,1],[0,2],[0,3],[0,4]],                          f: F.lila   },
  { z: [[0,0],[1,0],[2,0],[3,0],[4,0]],                          f: F.rosa   },
  { z: [[0,0],[0,1],[0,2],[1,0],[1,1],[1,2]],                    f: F.gruen  },
  { z: [[0,0],[0,1],[1,0],[1,1],[2,0],[2,1]],                    f: F.orange },
  { z: [[0,0],[0,1],[0,2],[1,0],[1,1],[1,2],[2,0],[2,1],[2,2]], f: F.rot    },
];

let raster      = [];
let zellen      = [];
let stuecke     = [null, null, null];
let punkte      = 0;
let highscore   = 0;
let istAnimiert = false;
let istGameOver = false;

const gridEl   = document.getElementById('grid');
const goScreen = document.getElementById('gameOverScreen');
const ghost    = document.getElementById('ghost');

function aktuelleFormen() {
  // Kleine Blöcke sind immer dabei – verhindert unspielbare Kombinationen
  if (punkte < 50)  return FORMEN_LEICHT;
  if (punkte < 150) return [...FORMEN_LEICHT, ...FORMEN_LEICHT, ...FORMEN_MITTEL];
  if (punkte < 400) return [...FORMEN_LEICHT, ...FORMEN_MITTEL, ...FORMEN_MITTEL];
  return [...FORMEN_LEICHT, ...FORMEN_MITTEL, ...FORMEN_MITTEL, ...FORMEN_SCHWER];
}

document.addEventListener('DOMContentLoaded', () => {
  PZ.updateNavbar();
  highscore = parseInt(localStorage.getItem('bb_hs') || '0', 10);
  document.getElementById('highscoreDisp').textContent = highscore;
  spielStart();
});

function spielStart() {
  raster = Array.from({ length: RASTER_SIZE }, () => Array(RASTER_SIZE).fill(null));
  stuecke = [null, null, null];
  punkte = 0;
  istGameOver = false;
  istAnimiert = false;
  goScreen.classList.remove('show');
  punkteRendern();
  rasterRendern();
  neuePiecesGenerieren();
}

function rasterRendern() {
  gridEl.innerHTML = '';
  zellen = Array.from({ length: RASTER_SIZE }, () => Array(RASTER_SIZE).fill(null));
  for (let r = 0; r < RASTER_SIZE; r++) {
    for (let c = 0; c < RASTER_SIZE; c++) {
      const div = document.createElement('div');
      div.className = 'cell';
      gridEl.appendChild(div);
      zellen[r][c] = div;
    }
  }
}

function zellFarbeSetzen(el, block) {
  if (block) {
    el.classList.add('filled');
    el.style.background = block.farbe;
    el.style.boxShadow  = `inset 0 3px 0 rgba(255,255,255,.28), inset 0 -2px 0 rgba(0,0,0,.25)`;
  } else {
    el.classList.remove('filled');
    el.style.background = '#162540';
    el.style.boxShadow  = 'none';
  }
}

function zufaelligesStueckPassend(maxVersuche = 80) {
  const formen = aktuelleFormen();
  for (let i = 0; i < maxVersuche; i++) {
    const f = formen[Math.floor(Math.random() * formen.length)];
    const s = { zellen: f.z, farbe: f.f };
    if (kannPassen(s)) return s;
  }
  for (const f of FORMEN_LEICHT.sort((a,b) => a.z.length - b.z.length)) {
    const s = { zellen: f.z, farbe: f.f };
    if (kannPassen(s)) return s;
  }
  return null;
}

function neuePiecesGenerieren() {
  for (let i = 0; i < 3; i++) stuecke[i] = zufaelligesStueckPassend();
  if (stuecke.every(s => s === null)) { setTimeout(() => spielEnde(), 300); return; }
  trayRendern();
}

function trayRendern() {
  for (let i = 0; i < 3; i++) {
    const slot = document.getElementById(`slot${i}`);
    slot.innerHTML = '';
    slot.classList.remove('used', 'cant-fit');
    const s = stuecke[i];
    if (!s) { slot.classList.add('used'); continue; }

    const rows = Math.max(...s.zellen.map(([r]) => r)) + 1;
    const cols = Math.max(...s.zellen.map(([, c]) => c)) + 1;
    const mg = document.createElement('div');
    mg.className = 'mini-piece';
    mg.style.gridTemplateColumns = `repeat(${cols}, 15px)`;
    mg.style.gridTemplateRows    = `repeat(${rows}, 15px)`;

    const occupied = new Set(s.zellen.map(([r, c]) => `${r},${c}`));
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const mc = document.createElement('div');
        mc.className = 'mini-cell';
        if (occupied.has(`${r},${c}`)) {
          mc.style.background = s.farbe;
          mc.style.boxShadow  = `inset 0 2px 0 rgba(255,255,255,.28), inset 0 -2px 0 rgba(0,0,0,.25)`;
        } else {
          mc.style.background = 'transparent';
        }
        mg.appendChild(mc);
      }
    }
    slot.appendChild(mg);
    slot.onpointerdown = (e) => dragStart(e, i);
  }
}

function kannPassen(s) {
  for (let r0 = 0; r0 < RASTER_SIZE; r0++) {
    for (let c0 = 0; c0 < RASTER_SIZE; c0++) {
      if (s.zellen.every(([dr, dc]) => {
        const r = r0 + dr, c = c0 + dc;
        return r >= 0 && r < RASTER_SIZE && c >= 0 && c < RASTER_SIZE && !raster[r][c];
      })) return true;
    }
  }
  return false;
}

function passFormPruefen() {
  const verbleibend = stuecke.filter(s => s !== null);
  if (verbleibend.length === 0) return;
  let nochMoeglich = false;
  for (let i = 0; i < 3; i++) {
    if (!stuecke[i]) continue;
    if (kannPassen(stuecke[i])) {
      nochMoeglich = true;
      document.getElementById(`slot${i}`).classList.remove('cant-fit');
    } else {
      document.getElementById(`slot${i}`).classList.add('cant-fit');
    }
  }
  if (!nochMoeglich) setTimeout(() => spielEnde(), 400);
}

function effZellGroesse() {
  const r0 = zellen[0][0].getBoundingClientRect();
  const r1 = zellen[0][1].getBoundingClientRect();
  return r1.left - r0.left;
}

let dragIdx    = -1;
let dragStueck = null;
let dragCS     = 0;

function dragStart(e, idx) {
  if (istAnimiert || istGameOver) return;
  const slot = document.getElementById(`slot${idx}`);
  if (slot.classList.contains('cant-fit') || slot.classList.contains('used')) return;
  e.preventDefault();
  dragIdx    = idx;
  dragStueck = stuecke[idx];
  dragCS     = effZellGroesse();

  const s    = dragStueck;
  const rows = Math.max(...s.zellen.map(([r]) => r)) + 1;
  const cols = Math.max(...s.zellen.map(([, c]) => c)) + 1;

  ghost.innerHTML = '';
  ghost.style.display = 'grid';
  ghost.style.gridTemplateColumns = `repeat(${cols}, ${dragCS}px)`;
  ghost.style.gridTemplateRows    = `repeat(${rows}, ${dragCS}px)`;
  ghost.style.gap    = '2px';
  ghost.style.width  = `${cols * dragCS + (cols-1)*2}px`;
  ghost.style.height = `${rows * dragCS + (rows-1)*2}px`;

  const occupied = new Set(s.zellen.map(([r, c]) => `${r},${c}`));
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const gc = document.createElement('div');
      gc.className = 'ghost-cell';
      gc.style.width  = `${dragCS}px`;
      gc.style.height = `${dragCS}px`;
      if (occupied.has(`${r},${c}`)) {
        gc.style.background = s.farbe;
        gc.style.boxShadow  = `inset 0 3px 0 rgba(255,255,255,.28), inset 0 -2px 0 rgba(0,0,0,.25)`;
      } else {
        gc.style.background = 'transparent';
      }
      ghost.appendChild(gc);
    }
  }
  ghostPositionieren(e.clientX, e.clientY);
  document.addEventListener('pointermove', dragMove);
  document.addEventListener('pointerup',   dragEnd);
  document.addEventListener('pointercancel', dragAbort);
}

function ghostPositionieren(cx, cy) {
  const s    = dragStueck;
  const rows = Math.max(...s.zellen.map(([r]) => r)) + 1;
  const cols = Math.max(...s.zellen.map(([, c]) => c)) + 1;
  const w    = cols * dragCS + (cols-1)*2;
  const h    = rows * dragCS + (rows-1)*2;
  ghost.style.left = `${cx - w/2}px`;
  ghost.style.top  = `${cy - h - dragCS*1.5}px`;
}

let vorschauZellen = [];

function vorschauLoeschen() {
  vorschauZellen.forEach(([r, c]) => {
    const el = zellen[r][c];
    el.classList.remove('preview-ok', 'preview-bad');
    zellFarbeSetzen(el, raster[r][c]);
  });
  vorschauZellen = [];
}

function rasterPosBerechnen(cx, cy) {
  const ref  = zellen[0][0].getBoundingClientRect();
  const cs   = dragCS;
  const s    = dragStueck;
  const rows = Math.max(...s.zellen.map(([r]) => r)) + 1;
  const cols = Math.max(...s.zellen.map(([, c]) => c)) + 1;
  const w    = cols * cs + (cols-1)*2;
  const pieceLeft = cx - w/2;
  const pieceTop  = cy - (rows * cs + (rows-1)*2) - cs*1.5;
  return {
    r0: Math.round((pieceTop  - ref.top)  / cs),
    c0: Math.round((pieceLeft - ref.left) / cs),
  };
}

function dragMove(e) {
  if (!dragStueck) return;
  ghostPositionieren(e.clientX, e.clientY);
  vorschauLoeschen();
  const { r0, c0 } = rasterPosBerechnen(e.clientX, e.clientY);
  const s = dragStueck;
  const gueltig = s.zellen.every(([dr, dc]) => {
    const r = r0+dr, c = c0+dc;
    return r>=0 && r<RASTER_SIZE && c>=0 && c<RASTER_SIZE && !raster[r][c];
  });
  s.zellen.forEach(([dr, dc]) => {
    const r = r0+dr, c = c0+dc;
    if (r<0||r>=RASTER_SIZE||c<0||c>=RASTER_SIZE) return;
    const el = zellen[r][c];
    if (gueltig) {
      el.classList.add('preview-ok');
      el.style.background = s.farbe;
      el.style.boxShadow  = `inset 0 3px 0 rgba(255,255,255,.28), inset 0 -2px 0 rgba(0,0,0,.25)`;
    } else {
      el.classList.add('preview-bad');
      el.style.background = 'rgba(220,60,60,.5)';
      el.style.boxShadow  = 'none';
    }
    vorschauZellen.push([r, c]);
  });
}

async function dragEnd(e) {
  if (!dragStueck) return;
  document.removeEventListener('pointermove', dragMove);
  document.removeEventListener('pointerup',   dragEnd);
  document.removeEventListener('pointercancel', dragAbort);
  vorschauLoeschen();
  ghost.style.display = 'none';
  const { r0, c0 } = rasterPosBerechnen(e.clientX, e.clientY);
  const s = dragStueck;
  const gueltig = s.zellen.every(([dr, dc]) => {
    const r = r0+dr, c = c0+dc;
    return r>=0 && r<RASTER_SIZE && c>=0 && c<RASTER_SIZE && !raster[r][c];
  });
  const idx = dragIdx;
  dragIdx = -1; dragStueck = null;
  if (gueltig) await steinSetzen(idx, r0, c0);
}

function dragAbort() {
  document.removeEventListener('pointermove', dragMove);
  document.removeEventListener('pointerup',   dragEnd);
  document.removeEventListener('pointercancel', dragAbort);
  vorschauLoeschen();
  ghost.style.display = 'none';
  dragIdx = -1; dragStueck = null;
}

async function steinSetzen(idx, r0, c0) {
  if (istAnimiert) return;
  const s = stuecke[idx];
  s.zellen.forEach(([dr, dc]) => {
    const r = r0+dr, c = c0+dc;
    raster[r][c] = { farbe: s.farbe };
    zellFarbeSetzen(zellen[r][c], raster[r][c]);
  });
  punkte += s.zellen.length;
  scorePopup(s.zellen.length, r0, c0);
  stuecke[idx] = null;
  document.getElementById(`slot${idx}`).classList.add('used');
  // Reihenfarbe = Farbe des platzierten Steins
  await linienLoeschen(r0, c0, s.farbe);
  if (stuecke.every(s => s === null)) neuePiecesGenerieren();
  else passFormPruefen();
  punkteRendern();
}

async function linienLoeschen(platzR, platzC, platzFarbe) {
  const volleReihen  = [];
  const volleSpalten = [];
  for (let r = 0; r < RASTER_SIZE; r++) {
    if (raster[r].every(b => b !== null)) volleReihen.push(r);
  }
  for (let c = 0; c < RASTER_SIZE; c++) {
    if (raster.every(row => row[c] !== null)) volleSpalten.push(c);
  }
  if (volleReihen.length === 0 && volleSpalten.length === 0) return;

  istAnimiert = true;

  const betroffen = new Set();
  volleReihen.forEach(r  => { for (let c=0;c<RASTER_SIZE;c++) betroffen.add(`${r},${c}`); });
  volleSpalten.forEach(c => { for (let r=0;r<RASTER_SIZE;r++) betroffen.add(`${r},${c}`); });

  // Alle betroffenen Zellen auf die Farbe des platzierten Steins setzen → dann blinken
  betroffen.forEach(key => {
    const [r, c] = key.split(',').map(Number);
    const el = zellen[r][c];
    el.style.background = platzFarbe;
    el.style.boxShadow  = `inset 0 3px 0 rgba(255,255,255,.28), inset 0 -2px 0 rgba(0,0,0,.25)`;
    el.classList.add('flash-line');
  });

  await new Promise(res => setTimeout(res, 350));

  betroffen.forEach(key => {
    const [r, c] = key.split(',').map(Number);
    zellen[r][c].classList.remove('flash-line');
    raster[r][c] = null;
    zellFarbeSetzen(zellen[r][c], null);
  });

  const gesamtLinien = volleReihen.length + volleSpalten.length;
  let liniePunkte    = betroffen.size * 2;
  if      (gesamtLinien >= 4) liniePunkte += gesamtLinien * 40;
  else if (gesamtLinien >= 2) liniePunkte += gesamtLinien * 20;

  punkte += liniePunkte;
  scorePopup(liniePunkte, platzR, platzC, true);
  punkteRendern();
  istAnimiert = false;
}

function punkteRendern() {
  document.getElementById('scoreDisp').textContent = punkte;
  if (punkte > highscore) {
    highscore = punkte;
    localStorage.setItem('bb_hs', highscore);
    document.getElementById('highscoreDisp').textContent = highscore;
  }
}

function scorePopup(n, r, c, linie = false) {
  const ref = zellen[Math.min(r,RASTER_SIZE-1)][Math.min(c,RASTER_SIZE-1)].getBoundingClientRect();
  const popup = document.createElement('div');
  popup.className = 'score-popup';
  popup.textContent = `+${n}`;
  popup.style.left = `${ref.left + ref.width/2}px`;
  popup.style.top  = `${ref.top + window.scrollY}px`;
  if (linie) popup.style.color = '#FECA57';
  document.body.appendChild(popup);
  popup.addEventListener('animationend', () => popup.remove());
}

async function spielEnde() {
  istGameOver = true;
  goScreen.classList.add('show');
  document.getElementById('goScore').textContent = punkte;
  const isNeu = punkte > 0 && punkte >= highscore;
  const hsEl  = document.getElementById('goHs');
  hsEl.textContent = isNeu ? '🎉 Neue Bestleistung!' : `Bestleistung: ${highscore}`;
  hsEl.className   = `go-hs${isNeu ? ' new-record' : ''}`;
  let nutzername = null;
  try {
    const user = await PZ.getUser().catch(() => null);
    if (user) {
      const saveResult = await PZ.saveGameData('block-blast', punkte, 1, {});
      if (saveResult?.error) console.error('[Block Blast] Speichern fehlgeschlagen:', saveResult.error);
      nutzername = await PZ.getUsername(user.id).catch(err => {
        console.error('[Block Blast] Benutzername laden fehlgeschlagen:', err);
        return null;
      });
    }
  } catch (err) {
    console.error('[Block Blast] spielEnde Fehler:', err);
  }
  const lbEl = document.getElementById('goLbList');
  try {
    const lb = await PZ.getLeaderboard('block-blast', 5);
    if (!lb || lb.length === 0) {
      lbEl.innerHTML = '<div class="lb-empty">Noch keine Einträge</div>';
    } else {
      lbEl.innerHTML = lb.map((e, i) => {
        const istIch = nutzername && e.benutzername === nutzername;
        const medal  = i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}.`;
        return `<div class="lb-row${istIch?' me':''}">
          <span class="lb-rank">${medal}</span>
          <span class="lb-name">${e.benutzername||'Unbekannt'}</span>
          <span class="lb-score">${e.punkte??0}</span>
        </div>`;
      }).join('');
    }
  } catch (err) {
    console.error('[Block Blast] Rangliste laden fehlgeschlagen:', err);
    lbEl.innerHTML = '<div class="lb-empty">Keine Verbindung</div>';
  }
}
</script>
